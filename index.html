<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Booking Form</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    button { padding: 12px 20px; background: #ff6b35; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    button:disabled { background: #ccc; }
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center;
    }
    .modal-content {
      background: white; padding: 30px; border-radius: 10px; text-align: center; max-width: 400px;
    }
  </style>
</head>
<body>

  <h1>Test Booking Form</h1>

  <form id="bookingForm">
    <div class="form-group">
      <label>First Name</label>
      <input type="text" id="firstName" value="John" required>
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input type="text" id="lastName" value="Doe" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" value="john@example.com" required>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" id="phone" value="+447123456789" required>
    </div>
    <div class="form-group">
      <label>Pickup Date</label>
      <input type="date" id="pickupDate" required>
    </div>
    <div class="form-group">
      <label>Pickup Time</label>
      <input type="time" id="pickupTime" required>
    </div>
    <div class="form-group">
      <label>Pickup Location</label>
      <input type="text" id="pickupLocation" value="Godalming" required>
    </div>
    <div class="form-group">
      <label>Drop-off Location</label>
      <input type="text" id="dropoffLocation" value="Heathrow" required>
    </div>
    <div class="form-group">
      <label>Vehicle</label>
      <select id="vehicle">
        <option value="Executive">Executive</option>
        <option value="Luxury SUV">Luxury SUV</option>
        <option value="Saloon">Saloon</option>
      </select>
    </div>
    <div class="form-group">
      <label>Special Requests</label>
      <textarea id="specialRequests" rows="3">Test booking from frontend</textarea>
    </div>

    <button type="submit">Submit Booking (Send Email)</button>
  </form>

  <!-- Success Modal -->
  <div class="modal" id="confirmationModal">
    <div class="modal-content">
      <h2>✅ Booking Submitted!</h2>
      <p>Email has been sent to admin.</p>
      <button onclick="document.getElementById('confirmationModal').style.display='none'">Close</button>
    </div>
  </div>

  <script>
    document.getElementById('bookingForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const submitBtn = this.querySelector('button');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = "Sending Email...";
      submitBtn.disabled = true;

      const formData = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        pickupDate: document.getElementById('pickupDate').value,
        pickupTime: document.getElementById('pickupTime').value,
        pickupLocation: document.getElementById('pickupLocation').value,
        dropoffLocation: document.getElementById('dropoffLocation').value,
        specialRequests: document.getElementById('specialRequests').value || 'None',
        vehicle: document.getElementById('vehicle').value
      };

      try {
        const response = await fetch('https://YOUR-TEST-VERCEL-URL.vercel.app/send-booking', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (result.success) {
          document.getElementById('confirmationModal').style.display = 'flex';
          this.reset();
        } else {
          alert("Failed to send email. Please try again.");
        }
      } catch (err) {
        alert("Error: Server may be waking up. Wait 10 seconds and try again.");
        console.error(err);
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
